services:
  # ── Frontend (Next.js) ──
  frontend:
    image: teslicvukasin/claw-ops-fe:latest
    container_name: clawops-fe
    env_file:
      - .env
    ports:
      - "${FE_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ── Backend (Spring Boot) ──
  backend:
    image: teslicvukasin/claw-ops:latest
    container_name: claw-ops
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      SPRING_PROFILES_ACTIVE: prod
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-false}"
      SSH_STRICT_HOST_KEY_CHECKING: "${SSH_STRICT_HOST_KEY_CHECKING:-true}"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Database ──
  postgres:
    image: postgres:17-alpine
    container_name: claw-ops-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-openclaw}
      POSTGRES_USER: ${DB_USERNAME:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - claw_ops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-openclaw} -d ${DB_NAME:-openclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  claw_ops_pgdata:
